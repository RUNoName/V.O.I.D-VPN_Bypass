name: V.O.I.D Parser Auto-Update

on:
  schedule:
    - cron: '*/55 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Устанавливаем всё, что нужно твоему парсеру (926 строк - это серьезно)
          pip install requests aiohttp aiofiles lxml beautifulsoup4

      - name: Install Xray Core
        run: |
          LATEST_URL=$(curl -s https://api.github.com/repos/XTLS/Xray-core/releases/latest | grep "browser_download_url.*Xray-linux-64.zip" | cut -d '"' -f 4)
          curl -L "$LATEST_URL" -o xray.zip
          unzip -o xray.zip
          chmod +x xray
          # Копируем и в систему, и в корень репо для надежности
          sudo cp xray /usr/local/bin/
          cp xray ./xray 

      - name: Run V.O.I.D Parser
        run: |
          # Создаем файлы, если их вдруг нет в репо, чтобы не было Code 3
          touch sources.txt
          mkdir -p configs
          # ЗАПУСК (убедись, что файл в репо называется parser.py)
          python parser.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "🌑 VOID: Эфир обновлен $(date +'%Y-%m-%d %H:%M')" || echo "No changes"
          git push
