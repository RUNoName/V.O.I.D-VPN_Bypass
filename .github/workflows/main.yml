name: V.O.I.D Parser Auto-Update

on:
  schedule:
    - cron: '*/55 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Устанавливаем всё, что нужно твоему парсеру (926 строк - это серьезно)
          pip install requests aiohttp aiofiles lxml beautifulsoup4

      - name: Install Xray Core
        run: |
          curl -L "https://github.com/XTLS/Xray-core/releases/download/v1.8.4/Xray-linux-64.zip" -o xray.zip
          # Распаковываем только нужные файлы, игнорируя README и LICENSE
          unzip -o xray.zip xray geoip.dat geosite.dat
          chmod +x xray
          sudo cp xray /usr/local/bin/xray || true
          echo "✅ Xray установлен без повреждения README"

      - name: Run V.O.I.D Parser
        run: |
          # Создаем папку, если её нет, чтобы Python не вылетел с ошибкой
          mkdir -p configs
          touch sources.txt processed.json
          
          # Запуск
          python parser.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "🌑 VOID: Эфир обновлен $(date +'%Y-%m-%d %H:%M')" || echo "No changes"
          git push
