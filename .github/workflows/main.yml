name: V.O.I.D Parser Auto-Update

on:
  schedule:
    - cron: '*/55 * * * *'  
  workflow_dispatch:        

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Устанавливаем всё необходимое для работы с сетью и парсинга
          pip install requests aiohttp aiofiles lxml beautifulsoup4

      - name: Install Xray Core
        run: |
          curl -L "https://github.com/XTLS/Xray-core/releases/download/v1.8.4/Xray-linux-64.zip" -o xray.zip
          unzip -o xray.zip xray geoip.dat geosite.dat
          chmod +x xray
          # Копируем в bin, чтобы xray был доступен системно
          sudo cp xray /usr/local/bin/xray || true
          echo "✅ Xray установлен"

      - name: Run V.O.I.D Parser
        run: |
          # Подготовка структуры
          mkdir -p configs
          # Запуск твоего основного скрипта
          python parser.py

      - name: Commit and push changes
        run: |
          # ВАЖНО: Твои данные для зачисления контрибьюций
          git config --local user.email "andrienkovova266@gmail.com"
          git config --local user.name "VOID-Anonymity"
          
          git add .
          # Если изменений нет (конфиги те же), скрипт не упадет с ошибкой
          git commit -m "🌑 VOID: Эфир обновлен $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
          git push
